<div id="lightbox-contenedor" class="lightbox-oculto">
    <span class="cerrar-lightbox">&times;</span>
    <img id="imagen-ampliada" src="" alt="Imagen Grande">
</div>


<script>
    document.addEventListener("DOMContentLoaded", () => {
        const fotos = document.querySelectorAll('.foto-proy img');
        const lightbox = document.getElementById('lightbox-contenedor');
        const imgAmpliada = document.getElementById('imagen-ampliada');
        const botonCerrar = document.querySelector('.cerrar-lightbox');

        // Al hacer clic en cualquier foto de proyecto
        fotos.forEach(foto => {
            foto.addEventListener('click', () => {
                const rutaImagen = foto.src; // Coge la ruta de la foto pequeña
                imgAmpliada.src = rutaImagen; // La pone en la grande
                lightbox.classList.remove('lightbox-oculto');
                lightbox.classList.add('lightbox-visible');
            });
        });

        // Al hacer clic en la (X) o fuera de la imagen
        function cerrar() {
            lightbox.classList.remove('lightbox-visible');
            lightbox.classList.add('lightbox-oculto');
        }

        botonCerrar.addEventListener('click', cerrar);
        
        // También cierra si haces clic en el fondo oscuro
        lightbox.addEventListener('click', (e) => {
            if (e.target !== imgAmpliada) {
                cerrar();
            }
        });

        // Cierra con la tecla Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && lightbox.classList.contains('lightbox-visible')) {
                cerrar();
            }
        });
    });
</script>
</body>
