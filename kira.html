<div id="lightbox-contenedor" class="lightbox-oculto">
    <span class="cerrar-lightbox">&times;</span>
    <img id="imagen-ampliada" src="" alt="Kira Grande">
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
    const lightbox = document.getElementById('lightbox-contenedor');
    const imgAmpliada = document.getElementById('imagen-ampliada');
    const botonCerrar = document.querySelector('.cerrar-lightbox');
    const galeria = document.querySelector('.contenedor-galeria');

    // IMPORTANTE: El clic lo escucha la galería entera
    galeria.addEventListener('click', (e) => {
        // Miramos si lo que hay justo debajo del dedo es una .foto-kira
        if (e.target.classList.contains('foto-kira')) {
            imgAmpliada.src = e.target.src;
            lightbox.classList.remove('lightbox-oculto');
            lightbox.classList.add('lightbox-visible');
        }
    });

    const cerrar = () => {
        lightbox.classList.remove('lightbox-visible');
        lightbox.classList.add('lightbox-oculto');
    };

    botonCerrar.addEventListener('click', cerrar);
    
    // Cerrar al tocar fuera de la imagen
    lightbox.addEventListener('click', (e) => {
        if (e.target !== imgAmpliada) cerrar();
    });
});
</script>
